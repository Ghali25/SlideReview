<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — SlideReview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: #1a1d23; margin-bottom: 0.25rem; }
    .logo span { color: #7c6af7; }
    .subtitle { font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem; }
    .input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit;
      outline: none; transition: border-color 0.15s;
      margin-bottom: 0.75rem;
    }
    .input:focus { border-color: #7c6af7; }
    .btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #7c6af7, #6d28d9);
      color: white; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
      margin-bottom: 1rem;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 13px; margin-bottom: 0.75rem; }
    .success { color: #10b981; font-size: 14px; }
    .back { font-size: 13px; color: #7c6af7; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Slide<span>Review</span></div>
  <div class="subtitle">Choisissez un nouveau mot de passe</div>

  <div id="formView">
    <input class="input" type="password" id="password" placeholder="Nouveau mot de passe (6 car. min)">
    <input class="input" type="password" id="confirm" placeholder="Confirmer le mot de passe">
    <div class="error" id="errorMsg"></div>
    <button class="btn" id="submitBtn" onclick="doReset()">Enregistrer le nouveau mot de passe</button>
    <a href="/" class="back">← Retour à l'accueil</a>
  </div>

  <div id="successView" style="display:none">
    <div class="success">✅ Mot de passe mis à jour avec succès !</div>
    <p style="font-size:13px;color:#6b7280;margin:12px 0">Vous êtes maintenant connecté.</p>
    <a href="/" class="back">Aller à l'application →</a>
  </div>

  <div id="expiredView" style="display:none">
    <div class="error">❌ Ce lien a expiré ou est invalide.</div>
    <p style="font-size:13px;color:#6b7280;margin:12px 0">Faites une nouvelle demande de réinitialisation.</p>
    <a href="/" class="back">Retour à l'accueil</a>
  </div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('expiredView').style.display = 'block';
  }

  async function doReset() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = '';

    if (password.length < 6) { errEl.textContent = 'Mot de passe trop court (6 caractères min).'; return; }
    if (password !== confirm) { errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Enregistrement…';

    const res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();

    if (data.ok) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } else if (res.status === 400) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('expiredView').style.display = 'block';
    } else {
      errEl.textContent = data.error || 'Erreur.';
      btn.disabled = false;
      btn.textContent = 'Enregistrer le nouveau mot de passe';
    }
  }
</script>
</body>
</html>
